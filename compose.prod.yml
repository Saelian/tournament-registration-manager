# Docker Compose pour déploiement Dokploy
# Usage: Importer ce fichier dans Dokploy comme service Docker Compose

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3333
    networks:
      - dokploy-network
    # Pas de ports exposés : Traefik gère le routage via les domaines configurés dans Dokploy

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - dokploy-network
    # Pas de ports exposés : Traefik gère le routage via les domaines configurés dans Dokploy

networks:
  dokploy-network:
    external: true

services:
  postgres:
    image: postgres:18.1-alpine
    container_name: trm_db
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./infra/postgres_data:/var/lib/postgresql/data:Z
    networks:
      - trm_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    container_name: trm_mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - trm_network

networks:
  trm_network:
    driver: bridge

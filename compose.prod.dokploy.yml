# Docker Compose pour déploiement Dokploy
# Usage: Importer ce fichier dans Dokploy comme service Docker Compose
#
# Les variables d'environnement sont configurées dans l'UI Dokploy (onglet Environment)
# Dokploy les injecte automatiquement dans les containers au démarrage

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    environment:
      # Variables système
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3333
      TZ: ${TZ:-Europe/Paris}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Sécurité
      APP_KEY: ${APP_KEY}
      SESSION_DRIVER: ${SESSION_DRIVER:-cookie}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-none}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      # Base de données
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      # SMTP
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_TLS: ${SMTP_TLS:-false}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
      MAIL_SENDER_NAME: ${MAIL_SENDER_NAME:-}
      # Admin
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME}
      # HelloAsso
      HELLOASSO_CLIENT_ID: ${HELLOASSO_CLIENT_ID:-}
      HELLOASSO_CLIENT_SECRET: ${HELLOASSO_CLIENT_SECRET:-}
      HELLOASSO_ORGANIZATION_SLUG: ${HELLOASSO_ORGANIZATION_SLUG:-}
      HELLOASSO_SANDBOX: ${HELLOASSO_SANDBOX:-false}
      # FFTT
      FFTT_APP_ID: ${FFTT_APP_ID:-}
      FFTT_PASSWORD: ${FFTT_PASSWORD:-}
      FFTT_MOCK: ${FFTT_MOCK:-false}
      # Paiements
      PAYMENT_EXPIRATION_MINUTES: ${PAYMENT_EXPIRATION_MINUTES:-30}
      PAYMENT_CLEANUP_INTERVAL_MINUTES: ${PAYMENT_CLEANUP_INTERVAL_MINUTES:-5}
      # URLs
      FRONTEND_URL: ${FRONTEND_URL}
    networks:
      - dokploy-network
    # Pas de ports exposés : Traefik gère le routage via les domaines configurés dans Dokploy

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - dokploy-network
    # Pas de ports exposés : Traefik gère le routage via les domaines configurés dans Dokploy

networks:
  dokploy-network:
    external: true

